<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Cut Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{
      --card:#ffffff;
      --card-2:#fafafc;
      --line:#e8e8ed;
      --text:#111111;
      --muted:#6e6e73;
      --blue:#0066cc;
      --blue-soft:#eef5ff;
      --shadow:0 10px 30px rgba(0,0,0,.05);
      --radius:24px;
      --max:1220px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#fbfbfd 0%,#f4f4f7 100%);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    .app{max-width:var(--max);margin:0 auto;padding:12px 10px 90px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px}
    .brand-title,.section-title,.hero-title,.food-name,.recipe-name,.modal-title,.meal-name,.panel h3{font-family:"Instrument Serif",serif;font-weight:400;letter-spacing:-.02em;margin:0}
    .brand-title{font-size:34px;line-height:1}
    .brand-sub{margin-top:6px;font-size:12px;color:var(--muted);letter-spacing:.04em}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill,.btn,.chip,.tab-btn,.tiny-btn,.seg-btn,.quick-btn{font:inherit;border:none}
    .pill{padding:10px 14px;border-radius:999px;background:var(--blue-soft);color:var(--blue);font-size:12px;font-weight:600}
    .btn,.tiny-btn,.chip,.tab-btn,.seg-btn,.quick-btn{cursor:pointer;transition:.18s ease}
    .btn{padding:11px 14px;border-radius:14px;background:#111;color:#fff;font-size:13px;font-weight:600;box-shadow:var(--shadow)}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--line)}
    .btn:hover,.tab-btn:hover,.chip:hover,.tiny-btn:hover,.seg-btn:hover,.quick-btn:hover{transform:translateY(-1px)}
    .layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px}
    .sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:14px;height:max-content}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel{padding:18px}.panel h3{font-size:24px;margin-bottom:12px}
    .small{font-size:12px;color:var(--muted);line-height:1.6}
    .metric-stack{display:grid;gap:10px}
    .metric-pill{padding:12px 14px;border-radius:16px;background:var(--card-2);border:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}
    .metric-pill strong{font-size:14px}.metric-pill span{font-size:12px;color:var(--muted)}
    .hero{padding:22px;margin-bottom:14px}.hero-title{font-size:42px;line-height:.95}
    .hero-copy{margin-top:10px;font-size:14px;line-height:1.65;color:var(--muted);max-width:780px}
    .hero-grid{margin-top:18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .hero-stat{padding:16px;border-radius:20px;background:var(--card-2);border:1px solid var(--line)}
    .hero-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .hero-stat .value{margin-top:8px;font-size:28px;font-family:"Instrument Serif",serif;line-height:1}
    .hero-stat .note{margin-top:6px;font-size:12px;color:var(--muted)}
    .tabs-card{padding:10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab-btn{padding:12px 14px;border-radius:14px;background:#fff;border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.04em}
    .tab-btn.active{background:#111;color:#fff;border-color:#111}
    .tab-panel{display:none;margin-top:14px}.tab-panel.active{display:block}
    .section-card{padding:18px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
    .section-title{font-size:30px}.section-sub{font-size:13px;color:var(--muted)}
    .grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
    .today-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .input-card{padding:14px;border-radius:18px;background:var(--card-2);border:1px solid var(--line)}
    .input-card label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
    .input-card input,.input-card select,.search input,.modal input,.modal textarea,.modal select,.auth-input{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--text);font:inherit;outline:none}
    .input-card textarea,.modal textarea{width:100%;min-height:90px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#b7d3ff;box-shadow:0 0 0 4px rgba(0,102,204,.08)}
    .today-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.summary-boxes{display:grid;gap:10px}
    .summary-box{padding:16px;border-radius:18px;border:1px solid var(--line);background:var(--card-2)}
    .summary-box .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .summary-box .big{margin-top:8px;font-size:26px;font-family:"Instrument Serif",serif}.summary-box .text{margin-top:8px;font-size:13px;line-height:1.55;color:var(--muted)}
    .search{position:relative;margin-bottom:12px}.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}.search input{padding-left:42px}
    .chip-row,.seg-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .chip,.seg-btn{padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--muted)}
    .chip.active,.seg-btn.active{background:#111;color:#fff;border-color:#111}
    .foods-grid,.meals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .food-card,.meal-card{padding:16px;border-radius:20px;border:1px solid var(--line);background:var(--card-2);display:flex;flex-direction:column;justify-content:space-between;min-height:152px}
    .food-card.clickable,.meal-card.clickable{cursor:pointer}
    .food-name,.meal-name{font-size:23px;line-height:1.02}.food-meta,.meal-meta{margin-top:6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .food-stats,.meal-stats{margin-top:14px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stat{padding:10px;border-radius:14px;background:#fff;border:1px solid var(--line)}
    .stat strong{display:block;font-size:17px;font-family:"Instrument Serif",serif;font-weight:400}.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.quick-btn{padding:10px 12px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:600;color:#111}
    .recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}.recipe-card{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:var(--card-2)}
    .recipe-top{padding:18px;cursor:pointer}.recipe-topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.recipe-emoji{font-size:30px;line-height:1}
    .tag{padding:8px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .recipe-name{font-size:28px;line-height:1.02}.recipe-meta{margin-top:8px;font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}.recipe-stats{margin-top:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .recipe-detail{display:none;padding:0 18px 18px;border-top:1px solid var(--line);background:#fff}.recipe-detail.open{display:block}.detail-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:16px;padding-top:16px}
    .detail-block h4{margin:0 0 10px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.ingredient-list,.steps-list{list-style:none;margin:0;padding:0}.ingredient-list li,.steps-list li{padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.55}.ingredient-list li:last-child,.steps-list li:last-child{border-bottom:none}
    .shopping-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:14px}.stack{display:grid;gap:10px}.shopping-group+.shopping-group{margin-top:16px}
    .shopping-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .shopping-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}.shopping-item:last-child{border-bottom:none}
    .check{width:22px;height:22px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;background:#fff}.check.checked{background:#111;color:#fff;border-color:#111}.shopping-item.done .shopping-name{text-decoration:line-through;color:var(--muted)}.shopping-qty{font-size:12px;color:var(--muted)}
    .tiny-btn{width:32px;height:32px;border-radius:10px;background:#fff;border:1px solid var(--line);color:var(--muted)}
    .progress-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.progress-card{padding:16px;border-radius:20px;background:var(--card-2);border:1px solid var(--line)}.progress-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.progress-card .value{margin-top:8px;font-size:28px;font-family:"Instrument Serif",serif;line-height:1}
    .log-list,.today-log{margin-top:14px;border-top:1px solid var(--line)}
    .log-row{display:grid;grid-template-columns:110px repeat(4,minmax(0,1fr)) 1.2fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);font-size:12px;align-items:start}
    .meal-log-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);align-items:center}
    .log-head{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:10px}
    .empty{text-align:center;padding:38px 14px;color:var(--muted);font-size:14px;line-height:1.7}
    .ring-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}.ring-card{padding:14px;border-radius:18px;background:var(--card-2);border:1px solid var(--line)}.ring-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.ring-card .value{margin-top:6px;font-size:26px;font-family:"Instrument Serif",serif}.ring-card .sub{margin-top:4px;font-size:12px;color:var(--muted)}
    .modal-overlay{position:fixed;inset:0;background:rgba(17,17,17,.18);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:18px;z-index:30}.modal-overlay.open{display:flex}
    .modal{width:min(540px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.12);overflow:hidden}.modal-body{padding:22px}.modal-title{font-size:36px;line-height:1}.modal-sub{margin-top:6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .modal-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:16px 0}.modal-stat{padding:12px;border-radius:16px;background:var(--card-2);border:1px solid var(--line)}.modal-stat strong{display:block;font-size:22px;font-family:"Instrument Serif",serif;font-weight:400}.modal-stat span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.modal-actions{display:flex;gap:10px;padding:0 22px 22px}
    .toast{position:fixed;right:16px;bottom:16px;z-index:40;background:#111;color:#fff;padding:13px 16px;border-radius:16px;box-shadow:var(--shadow);transform:translateY(8px);opacity:0;transition:.2s ease;pointer-events:none;font-size:13px}.toast.show{transform:translateY(0);opacity:1}
    @media (max-width:980px){.layout,.grid-2,.shopping-layout,.detail-grid{grid-template-columns:1fr}.sidebar{position:static}.hero-grid,.progress-grid,.ring-row{grid-template-columns:repeat(2,minmax(0,1fr))}.log-row{grid-template-columns:1fr 1fr;gap:8px}}
    @media (max-width:680px){.app{padding:12px 10px 90px}.topbar{flex-direction:column;align-items:stretch}.top-actions{justify-content:flex-start}.brand-title{font-size:30px}.hero{padding:18px}.hero-title{font-size:34px}.hero-grid,.today-grid,.recipe-stats,.modal-grid,.progress-grid,.ring-row{grid-template-columns:1fr 1fr}.foods-grid,.recipes-grid,.meals-grid{grid-template-columns:1fr}.section-card,.panel{padding:16px}.tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.tab-btn{width:100%}.log-row{grid-template-columns:1fr}.meal-log-row{grid-template-columns:1fr auto}.modal-actions{flex-direction:column}}
  </style>
</head>
<body>
  <div class="app">
    <div class="card panel" id="auth-panel" style="margin-bottom:14px;">
      <di
